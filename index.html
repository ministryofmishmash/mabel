  body {
    font-family: 'Manrope', system-ui, sans-serif;

  .nav-link {

    display: block;

  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

    font-family: 'Bitcount Prop Single', system-ui, sans-serif;

    padding: 14px 28px;
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    transition: background .2s, border-color .2s;
  }

  .app-btn:hover {
    background: rgba(255,255,255,.2);
    border-color: rgba(255,255,255,.35);
  }

  .app-btn svg { flex-shrink: 0; }

  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 48px 0;
  }

    .features { grid-template-columns: 1fr; }
  }

  .feature {

    padding: 0 32px 16px;

  }

  .screenshot-caption {

    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 32px;
  }

  .privacy-block { margin-bottom: 28px; }

  .privacy-block h3 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: rgba(255,255,255,.4);
    margin-bottom: 8px;
  }

  .privacy-block p {
    font-size: 14px;
    color: rgba(255,255,255,.65);
    line-height: 1.7;
  }

  .privacy-block a { color: #C9B8F0; text-decoration: none; }
  .privacy-block a:hover { text-decoration: underline; }
